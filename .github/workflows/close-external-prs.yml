name: Close external PRs

# Automatically closes any pull request not opened by the repository owner
# and leaves a short explanation. Runs on pull_request_target so it has
# write permissions even when the PR comes from a fork.

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  close:
    if: github.event.pull_request.user.login != github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Close and comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thanks for the interest! This project is maintained by a single author and not accepting pull requests. Feel free to fork the repo if you want to build on it."
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: "closed"
            });
